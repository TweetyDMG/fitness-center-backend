# === Fitness Center Backend - Example Configuration ===
# Copy this file to application-local.properties or application-dev.properties
# and fill in your actual values. NEVER commit real secrets to git!

# =============================================================================
# DATABASE (Microsoft SQL Server)
# =============================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=FitnessCenter;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=CHANGE_ME_STRONG_PASSWORD
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =============================================================================
# JPA / HIBERNATE
# =============================================================================
# validate = проверяет схему, не меняет (требует ручных миграций)
# update = автоматически обновляет схему (ТОЛЬКО для разработки!)
# create = создает схему при старте (УДАЛЯЕТ ДАННЫЕ!)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# =============================================================================
# JWT SECURITY
# =============================================================================
# Generate a secure secret: openssl rand -base64 64
# Minimum 512 bits (64 bytes) for HS512 algorithm
jwt.secret=GENERATE_WITH: openssl rand -base64 64
jwt.expiration=86400000

# =============================================================================
# SWAGGER / OPENAPI
# =============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# =============================================================================
# ACTUATOR / MONITORING
# =============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.fitnesscenter=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =============================================================================
# SERVER
# =============================================================================
server.port=8080
server.servlet.context-path=/